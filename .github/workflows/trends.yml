name: crypto-radar-trends

# L'AGENTE TREND: ogni 4h chiede a Grok (X live) cosa scalda sulle memecoin Solana e salva il
# segnale nella serie storica (data/trends.jsonl). E' la nostra fonte social/virale a basso costo.
# Il nostro edge non e' avere Grok (ce l'hanno tutti) ma la STRUTTURA: serie storica + cross-check
# on-chain + backtest di quali segnali predicono il pump.
on:
  schedule:
    - cron: "15 * * * *"       # ogni 1 ora (CFO: ~$0.03/query, 24/giorno ≈ $22/mese, coperto dai $175 free se data-sharing ON; ~720 min/mese GitHub, dentro il free tier)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Cattura trend da Grok (X live) + FILTRO on-chain
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          python trend_agent.py
          python filter_tokens.py 3
          python pipeline_export.py

      - name: Salva trend + candidate filtrate + dashboard json
        run: |
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/trends.jsonl data/candidates.jsonl web/pipeline.json
          git commit -m "trend $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "niente di nuovo"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --no-rebase --no-edit origin main || true
            git push origin main && exit 0
            sleep 5
          done
          echo "push fallito"; exit 1

      - name: Aggiorna dashboard pubblica (X-first)
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          git clone --depth 1 "https://x-access-token:${PAGES_PAT}@github.com/nicolostancato-web/crypto-radar-dashboard.git" /tmp/dash
          cp web/index.html web/styles.css web/app.js web/pipeline.json /tmp/dash/
          cd /tmp/dash
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "dashboard $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "nessun cambiamento"; exit 0; }
          for i in 1 2 3; do
            git pull --no-rebase --no-edit origin main || true
            git push origin main && exit 0
            sleep 4
          done
          echo "dashboard push fallito (non blocca il radar)"; exit 0
