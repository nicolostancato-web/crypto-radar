name: crypto-radar-improve

# IL LOOP DEL MIGLIORAMENTO (LOOP_MIGLIORAMENTO.md): ogni 24h chiede a un'AI esterna (DeepSeek) "cosa
# miglioreresti dato lo stato e i dati di oggi?" e manda il feedback via email a Nicolo. L'umano decide
# cosa implementare. Costo ~$0.01/giorno (DeepSeek economico).
on:
  schedule:
    - cron: "0 7 * * *"     # ogni giorno alle 07:00 UTC (mattina, prima del lavoro)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Standup squadra (KPI + Trader + Accumulo) + email
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python team_standup.py
          python portfolio_sim.py
          python improve_agent.py

      - name: Salva il feedback + KPI/trade del giorno
        run: |
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/improvements/ data/improve_state.json data/kpi_history.jsonl data/trade_learnings.jsonl data/trade_config.json web/team.json web/kpi.json web/portfolio.json
          git commit -m "standup $(date -u +%Y-%m-%d)" || { echo "niente di nuovo"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --no-rebase --no-edit -X theirs origin main || true
            git push origin main && exit 0
            sleep 5
          done
          echo "push non riuscito (corsa su file) — recupera al prossimo ciclo"; exit 0
