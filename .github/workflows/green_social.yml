name: crypto-radar-green-social

# SOCIAL TRACKER per le GREEN: ogni 4h misura l'hype su X (posts/ora, trend, KOL) dei soli token green
# attivi. A pagamento (Grok), cap 5 green/ciclo. Serie storica dell'engagement da incrociare col prezzo.
on:
  schedule:
    - cron: "20 */4 * * *"     # ogni 4 ore (CFO: cap 5 green x ~$0.03 = max ~$0.15/ciclo)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  green-social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Misura engagement X delle green
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: python green_engagement.py

      - name: Salva serie social green
        run: |
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/green_social.jsonl
          git commit -m "green social $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "niente di nuovo"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --no-rebase --no-edit origin main || true
            git push origin main && exit 0
            sleep 5
          done
          echo "push fallito"; exit 1
