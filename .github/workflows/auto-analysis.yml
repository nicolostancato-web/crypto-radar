name: crypto-radar-auto-analysis

# IL CERVELLO DA 6 ORE. Gira nel cloud (Mac spento). Legge i paper-trade dello scenario
# attivo, decide PARK/AVANZA/FUNZIONA da solo, consulta il Double Agent (GPT-5/DeepSeek),
# e scrive scenario_overrides.json + ROADMAP_STATO.md. Si auto-migliora 24/7.
on:
  # cron DISATTIVATO (vecchio sistema copy-trading): gira solo a mano (workflow_dispatch)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar                 # stesso gruppo del radar: niente scritture concorrenti sul DB
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (porta giù l'ultimo radar.db)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Auto-analisi 6h (decide + consulta Double Agent)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_analysis.py

      - name: Salva stato (solo file di testo, mergeabili - niente radar.db)
        run: |
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scenario_overrides.json ROADMAP_STATO.md
          git commit -m "auto-analisi $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "niente da committare"; exit 0; }
          for i in 1 2 3; do
            git pull --no-rebase --no-edit origin main || true
            git push origin main && exit 0
            sleep 5
          done
          echo "push fallito dopo 3 tentativi"; exit 1
