name: crypto-radar-track

# TRACKING ORARIO (gratis): ogni ora aggiorna prezzo/volume/whale di tutti i token seguiti, ri-apprende
# e aggiorna la dashboard. NON chiama Grok (quello e' lo scan, ogni 4h in trends.yml). Solo DexScreener+Helius.
# E' la granularita' oraria che serve per studiare il timing di entrata/uscita delle green.
on:
  schedule:
    - cron: "*/30 * * * *"   # ogni 30 min (piu fitto: anche se GitHub salta meta dei cron, gira ~ogni ora) (gratis: DexScreener + Helius, dentro i free tier)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar               # stesso gruppo dello scan: niente run git sovrapposti
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Traccia prezzi/whale + ri-apprendi
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
        run: |
          python tracker.py
          python learner.py
          python pipeline_export.py
          python paper_account.py

      - name: Meeting di allenamento giornaliero (sveglia interna 1x al giorno dopo le 06 UTC)
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python team_meeting.py daily

      - name: Sveglia gli scan in ritardo (cron-job.org interno)
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: python wake.py

      - name: Salva tracking + stato
        run: |
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/track.jsonl data/learnings.json web/pipeline.json web/portfolio.json data/paper_account.json web/team.json web/kpi.json web/meeting.json data/meeting_history.jsonl data/meeting_last_date.txt data/trade_config.json
          git commit -m "track $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "niente di nuovo"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --no-rebase --no-edit -X theirs origin main || true
            git push origin main && break
            sleep 5
          done

      - name: Aggiorna dashboard pubblica
        env:
          PAGES_PAT: ${{ secrets.PAGES_PAT }}
        run: |
          git clone --depth 1 "https://x-access-token:${PAGES_PAT}@github.com/nicolostancato-web/crypto-radar-dashboard.git" /tmp/dash
          cp web/index.html web/styles.css web/app.js web/pipeline.json web/portfolio.json web/team.json web/kpi.json web/meeting.json /tmp/dash/
          cd /tmp/dash
          git config user.name "crypto-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git commit -m "dashboard $(date -u +%Y-%m-%dT%H:%MZ)" || { echo "nessun cambiamento"; exit 0; }
          for i in 1 2 3; do
            git pull --no-rebase --no-edit -X theirs origin main || true
            git push origin main && exit 0
            sleep 4
          done
          echo "dashboard push fallito (non blocca)"; exit 0
